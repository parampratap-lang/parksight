# Render Blueprint — one web service running the full app (FastAPI + built React + artifacts).
# Deploy from a PRIVATE repo that includes backend/artifacts/*.json.
# In the Render dashboard: New → Blueprint → connect the private repo → set ANTHROPIC_API_KEY.
services:
  - type: web
    name: parksight
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false        # set this secret in the Render dashboard; never commit it
